<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보처리기사 필기 스터디</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%231858c8'/><path d='M27 53 L44 70 L75 31' fill='none' stroke='white' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  --ok:#3fb950; --okbg:#13351c; --no:#f85149; --nobg:#3a1518;
  --unk:#d29922; --unkbg:#3a2e10;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
  line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--accent)}
.hidden{display:none!important}

/* 로그인 */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#gate .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:32px 28px;width:90%;max-width:340px;text-align:center}
#gate h1{font-size:18px;margin:0 0 6px}
#gate p{color:var(--muted);font-size:13px;margin:0 0 20px}
#gate input{width:100%;padding:12px;font-size:18px;text-align:center;letter-spacing:4px;
  background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px}
#gate button{width:100%;padding:12px;font-size:15px;font-weight:600;background:var(--accent);
  color:#0d1117;border:none;border-radius:8px;cursor:pointer}
#gate .err{color:var(--no);font-size:13px;height:16px;margin-top:8px}

/* 레이아웃 */
header{position:sticky;top:0;background:rgba(13,17,23,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:50}
header h1{font-size:15px;margin:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .dday{font-size:12px;color:var(--unk);font-weight:600;white-space:nowrap}
.iconbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:7px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.wrap{display:flex;max-width:1100px;margin:0 auto;gap:0}
nav{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:10px 10px 96px;
  height:calc(100vh - 49px);overflow-y:auto;overscroll-behavior:contain;position:sticky;top:49px}
nav .dayitem{padding:9px 11px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:6px}
nav .dayitem:hover{background:var(--panel)}
nav .dayitem.active{background:var(--panel2);font-weight:600}
nav .dayitem .dlabel{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
nav .dayitem .dlabel b{font-weight:700}
nav .dayitem .badge{font-size:10px;padding:1px 6px;border-radius:9px;background:var(--okbg);color:var(--ok)}
nav .dayitem .badge.partial{background:var(--unkbg);color:var(--unk)}
main{flex:1;padding:18px 20px 80px;min-width:0}
@media(max-width:780px){
  nav{position:fixed;left:0;top:49px;background:var(--bg);z-index:40;transform:translateX(-100%);transition:.2s;width:230px}
  nav.open{transform:translateX(0)}
  .wrap{display:block}
}

.daymeta{margin-bottom:6px}
.daymeta .sub{color:var(--accent);font-size:12px;font-weight:600}
.daymeta h2{font-size:18px;margin:3px 0 2px}
.daymeta .dt{color:var(--muted);font-size:12px}

/* 문제 카드 */
.q{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:16px 16px 14px;margin:14px 0}
.q .qhead{display:flex;justify-content:space-between;gap:8px;align-items:baseline;margin-bottom:8px}
.q .qno{font-weight:700;font-size:14px;color:var(--accent)}
.q .qsrc{font-size:11px;color:var(--muted);text-align:right}
.q .stem{font-size:15px;margin-bottom:12px}
.q .stem p{margin:.4em 0}
.q .stem blockquote{border-left:3px solid var(--border);margin:.5em 0;padding:.2em 0 .2em 12px;color:var(--text)}
.q .stem pre{background:#0a0e14;border:1px solid var(--border);border-radius:8px;padding:11px;overflow-x:auto;font-size:13px}
.q .stem code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.q .stem :not(pre)>code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:13px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border:1px solid var(--border);
  border-radius:8px;cursor:pointer;background:var(--panel2);font-size:14px;transition:.12s}
.opt:hover{border-color:var(--accent)}
.opt .mk{font-weight:700;flex-shrink:0}
.opt.sel{border-color:var(--accent);background:#1b2a40}
.opt.unknown{color:var(--muted);font-style:italic}
.opt.correct{border-color:var(--ok);background:var(--okbg)}
.opt.wrong{border-color:var(--no);background:var(--nobg)}
.opt.disabled{cursor:default}
.expl{margin-top:11px;padding:11px 13px;background:var(--panel2);border-radius:8px;font-size:13.5px;border-left:3px solid var(--accent)}
.expl.is-ok{border-left-color:var(--ok)}
.expl.is-no{border-left-color:var(--no)}
.expl.is-unk{border-left-color:var(--unk)}
.expl .tag{font-weight:700;font-size:12px;margin-bottom:4px;display:inline-block}
.expl pre{background:#0a0e14;border:1px solid var(--border);border-radius:6px;padding:9px;overflow-x:auto;font-size:12.5px}

/* 하단 제출바 */
.submitbar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);
  padding:11px 16px;display:flex;align-items:center;gap:12px;z-index:45}
.submitbar .prog{flex:1;font-size:13px;color:var(--muted)}
.submitbar button{padding:10px 18px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:var(--accent);color:#0d1117}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)!important}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* 결과 요약 */
.result{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:16px;margin:14px 0;text-align:center}
.result .score{font-size:28px;font-weight:800}
.result .bars{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.result .pill{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600}
.pill.ok{background:var(--okbg);color:var(--ok)}
.pill.no{background:var(--nobg);color:var(--no)}
.pill.unk{background:var(--unkbg);color:var(--unk)}
.synced{font-size:12px;margin-top:10px}
.synced.ok{color:var(--ok)} .synced.no{color:var(--no)} .synced.warn{color:var(--unk)}

/* 설정 모달 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:90}
.modal .mbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px;width:92%;max-width:440px}
.modal h3{margin:0 0 12px;font-size:16px}
.modal label{font-size:13px;color:var(--muted);display:block;margin:12px 0 5px}
.modal input{width:100%;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px}
.modal .mrow{display:flex;gap:8px;margin-top:16px}
.modal .mrow button{flex:1;padding:10px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:14px}
.modal small{color:var(--muted);font-size:11.5px;display:block;margin-top:6px;line-height:1.5}
.review-note{background:var(--unkbg);color:var(--unk);border-radius:8px;padding:10px 13px;font-size:13px;margin:10px 0}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div class="box">
    <h1>🔒 정보처리기사 스터디</h1>
    <p>비밀번호를 입력하세요</p>
    <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
    <button id="pwbtn">입장</button>
    <div class="err" id="pwerr"></div>
  </div>
</div>

<!-- 본문 (잠금 해제 후 표시) -->
<div id="app" class="hidden">
  <header>
    <button class="iconbtn" id="menubtn" style="display:none">☰</button>
    <h1 id="hdrtitle">정보처리기사 필기</h1>
    <span class="dday" id="hdrdday"></span>
    <a class="iconbtn" href="cheatsheet.html" style="text-decoration:none">📄 암기노트</a>
    <button class="iconbtn" id="setbtn">⚙️</button>
  </header>
  <div class="wrap">
    <nav id="nav"></nav>
    <main id="main"></main>
  </div>
  <div class="submitbar" id="submitbar">
    <span class="prog" id="prog"></span>
    <button class="btn-ghost" id="resetbtn">다시 풀기</button>
    <button class="btn-primary" id="submitbtn" disabled>제출 & 채점</button>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal hidden" id="setmodal">
  <div class="mbox">
    <h3>⚙️ 설정 — GitHub 연동</h3>
    <p style="font-size:13px;color:var(--muted);margin:0">
      오답·모름을 깃에 저장해 다음날 복습에 반영하려면 GitHub 토큰이 필요합니다.
      토큰은 <b>이 브라우저에만</b> 저장되며 깃에 올라가지 않습니다.
    </p>
    <label>GitHub Personal Access Token (fine-grained, contents: write)</label>
    <input id="pat" type="password" placeholder="github_pat_...">
    <small>발급: GitHub → Settings → Developer settings → Fine-grained tokens →
      Repository access를 <b>bananike/eip-study</b>로 한정, Permissions에서 <b>Contents: Read and write</b> 부여.</small>
    <div class="mrow">
      <button class="btn-ghost" id="setclose">닫기</button>
      <button class="btn-primary" id="setsave">저장</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  REPO: "bananike/eip-study",
  BRANCH: "main",
  PW_HASH: "903a4207be29cb52c7c28b6b3e83b7bea776a390167924fe8ff18aa325f10285"
};
const MARKS = ["①","②","③","④"];
let DATA = null, curDate = null, state = {}; // state[date] = {sel:{n:idx|'unknown'}, submitted:bool}

/* ---------- 비밀번호 ---------- */
async function sha256(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function tryUnlock(pw){
  const h = await sha256(pw);
  if(h === CONFIG.PW_HASH){ localStorage.setItem("unlocked","1"); openApp(); return true; }
  return false;
}
document.getElementById("pwbtn").onclick = async ()=>{
  const ok = await tryUnlock(document.getElementById("pw").value.trim());
  if(!ok) document.getElementById("pwerr").textContent = "비밀번호가 틀렸습니다";
};
document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("pwbtn").click(); });

/* ---------- 앱 시작 ---------- */
async function openApp(){
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  if(!DATA){
    const res = await fetch("quiz.json?_="+Date.now());
    DATA = await res.json();
    DATA.days.sort((a,b)=>a.day-b.day);
  }
  loadLocalState();
  renderNav();
  const last = localStorage.getItem("lastDate");
  const exists = DATA.days.some(d=>d.date===last);
  selectDay(exists ? last : DATA.days[DATA.days.length-1].date);
  setupResponsiveNav();
}
function loadLocalState(){
  try{ state = JSON.parse(localStorage.getItem("quizState")||"{}"); }catch(e){ state={}; }
}
function saveLocalState(){ localStorage.setItem("quizState", JSON.stringify(state)); }

/* ---------- D-day ---------- */
function ddayText(){
  const exam = new Date("2026-08-07T00:00:00+09:00");
  const now = new Date();
  const diff = Math.ceil((exam-now)/86400000);
  return diff>0 ? "D-"+diff : (diff===0?"D-DAY":"D+"+(-diff));
}

/* ---------- 네비 ---------- */
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  DATA.days.forEach(d=>{
    const st = state[d.date];
    let badge = "";
    if(st && st.submitted){
      const total = d.questions.length;
      const correct = d.questions.filter(q=>st.sel[q.n]===q.answer).length;
      badge = `<span class="badge ${correct===total?'':'partial'}">${correct}/${total}</span>`;
    }
    const item = document.createElement("div");
    item.className = "dayitem"+(d.date===curDate?" active":"");
    item.innerHTML = `<span class="dlabel"><b>Day ${d.day}</b> · ${shortSubject(d.subject)}</span>${badge}`;
    item.onclick = ()=>{ selectDay(d.date); closeNavMobile(); };
    nav.appendChild(item);
  });
}

/* ---------- 하루 렌더 ---------- */
function selectDay(date){
  curDate = date;
  localStorage.setItem("lastDate", date);
  if(!state[date]) state[date] = {sel:{}, submitted:false};
  const d = DATA.days.find(x=>x.date===date);
  document.getElementById("hdrtitle").textContent = `Day ${d.day} · ${d.topic.slice(0,30)}`;
  document.getElementById("hdrdday").textContent = ddayText();
  renderDay(d);
  renderNav();
  window.scrollTo(0,0);
}
function renderDay(d){
  const main = document.getElementById("main");
  const st = state[d.date];
  let html = `<div class="daymeta"><div class="sub">${d.subject}</div>
    <h2>${d.topic}</h2><div class="dt">${d.date} · Day ${d.day}/88</div></div>`;

  // 복습 안내 (이전 날 오답이 review로 들어온 경우 — 데이터에 review 플래그가 있으면)
  if(d.review_from){
    html += `<div class="review-note">🔄 오늘 ${d.review_count||''}문제는 <b>${d.review_from}</b> 오답/모름 복습 문항입니다.</div>`;
  }

  d.questions.forEach(q=>{
    const sel = st.sel[q.n];
    const submitted = st.submitted;
    html += `<div class="q" data-qn="${q.n}">
      <div class="qhead"><span class="qno">문제 ${q.n}</span><span class="qsrc">${escapeHtml(q.source||"")}</span></div>
      <div class="stem">${marked.parse(q.stem_md||"")}</div>
      <div class="opts">`;
    q.options.forEach((opt,i)=>{
      let cls = "opt";
      if(submitted){
        cls += " disabled";
        if(i===q.answer) cls += " correct";
        else if(sel===i) cls += " wrong";
        else if(sel===i) cls += " sel";
      } else if(sel===i){ cls += " sel"; }
      html += `<div class="${cls}" data-pick="${i}"><span class="mk">${MARKS[i]}</span><span>${escapeHtml(opt)}</span></div>`;
    });
    // 모름 버튼
    let unkCls = "opt unknown";
    if(submitted){ unkCls+=" disabled"; if(sel==='unknown') unkCls+=" sel"; }
    else if(sel==='unknown'){ unkCls+=" sel"; }
    html += `<div class="${unkCls}" data-pick="unknown"><span class="mk">❓</span><span>모름 (찍지 않고 넘어감)</span></div>`;
    html += `</div>`;

    if(submitted){
      let kind, tag;
      if(sel==='unknown'){ kind="is-unk"; tag="⚠️ 모름 → 복습 대상"; }
      else if(sel===q.answer){ kind="is-ok"; tag="✅ 정답"; }
      else { kind="is-no"; tag="❌ 오답 → 복습 대상"; }
      html += `<div class="expl ${kind}"><span class="tag">${tag} · 정답 ${MARKS[q.answer]}</span>
        <div>${marked.parse(q.explanation_md||"")}</div></div>`;
    }
    html += `</div>`;
  });

  if(st.submitted) html += renderResult(d);
  main.innerHTML = html;

  // 클릭 핸들러
  if(!st.submitted){
    main.querySelectorAll(".opt").forEach(el=>{
      el.onclick = ()=>{
        const qn = +el.closest(".q").dataset.qn;
        const pick = el.dataset.pick;
        st.sel[qn] = pick==='unknown' ? 'unknown' : +pick;
        saveLocalState();
        renderDay(d);
      };
    });
  }
  updateSubmitBar(d);
}

function renderResult(d){
  const st = state[d.date];
  const total = d.questions.length;
  let ok=0,no=0,unk=0;
  d.questions.forEach(q=>{
    const s = st.sel[q.n];
    if(s==='unknown') unk++;
    else if(s===q.answer) ok++;
    else no++;
  });
  const syncId = "syncmsg";
  return `<div class="result">
    <div class="score">${ok} / ${total}</div>
    <div class="bars">
      <span class="pill ok">✅ 맞음 ${ok}</span>
      <span class="pill no">❌ 틀림 ${no}</span>
      <span class="pill unk">❓ 모름 ${unk}</span>
    </div>
    <div class="synced" id="${syncId}"></div>
  </div>`;
}

function updateSubmitBar(d){
  const st = state[d.date];
  const answered = d.questions.filter(q=>st.sel[q.n]!==undefined).length;
  const total = d.questions.length;
  document.getElementById("prog").textContent =
    st.submitted ? `채점 완료 · ${d.date}` : `${answered}/${total} 선택됨`;
  const sbtn = document.getElementById("submitbtn");
  sbtn.disabled = st.submitted || answered<total;
  sbtn.textContent = st.submitted ? "제출됨" : "제출 & 채점";
}

/* ---------- 제출 & 채점 ---------- */
document.getElementById("submitbtn").onclick = async ()=>{
  const d = DATA.days.find(x=>x.date===curDate);
  const st = state[curDate];
  st.submitted = true;
  saveLocalState();
  renderDay(d);
  renderNav();
  // 깃 커밋
  const payload = buildProgress(d);
  syncMsg("⏳ 깃에 저장 중...","warn");
  const r = await commitProgress(curDate, payload);
  if(r.ok) syncMsg("✅ 깃 저장 완료 — 다음날 복습에 반영됩니다","ok");
  else if(r.reason==="no-token") syncMsg("⚠️ 토큰 미설정 — 우측 상단 ⚙️에서 등록하면 깃에 저장됩니다. (지금은 이 기기에만 저장됨)","warn");
  else syncMsg("❌ 깃 저장 실패: "+r.reason+" — 토큰 권한을 확인하세요","no");
};
document.getElementById("resetbtn").onclick = ()=>{
  const st = state[curDate];
  st.sel = {}; st.submitted=false;
  saveLocalState();
  selectDay(curDate);
};
function syncMsg(t,cls){
  const el = document.getElementById("syncmsg");
  if(el){ el.textContent=t; el.className="synced "+cls; }
}

function buildProgress(d){
  const st = state[d.date];
  const wrong=[],unknown=[],correct=[];
  d.questions.forEach(q=>{
    const s = st.sel[q.n];
    if(s==='unknown') unknown.push(q.n);
    else if(s===q.answer) correct.push(q.n);
    else wrong.push(q.n);
  });
  const review = [...wrong,...unknown].sort((a,b)=>a-b);
  return {
    date:d.date, day:d.day, subject:d.subject, topic:d.topic,
    correct, wrong, unknown,
    review_next: review,
    score: `${correct.length}/${d.questions.length}` + (unknown.length?` (모름 ${unknown.length})`:""),
    ts: new Date().toISOString()
  };
}

/* ---------- GitHub API ---------- */
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
async function commitProgress(date, payload){
  const token = localStorage.getItem("gh_pat");
  if(!token) return {ok:false, reason:"no-token"};
  const path = `progress/${date}.json`;
  const url = `https://api.github.com/repos/${CONFIG.REPO}/contents/${path}`;
  const headers = {Authorization:"Bearer "+token, Accept:"application/vnd.github+json"};
  try{
    let sha;
    const g = await fetch(url+"?ref="+CONFIG.BRANCH, {headers});
    if(g.status===200){ sha=(await g.json()).sha; }
    const body = {
      message:`progress ${date}: ${payload.score}`,
      content: b64(JSON.stringify(payload,null,1)),
      branch: CONFIG.BRANCH
    };
    if(sha) body.sha=sha;
    const p = await fetch(url,{method:"PUT",headers,body:JSON.stringify(body)});
    if(p.status===200||p.status===201) return {ok:true};
    const e = await p.json().catch(()=>({}));
    return {ok:false, reason:(e.message||("HTTP "+p.status))};
  }catch(err){ return {ok:false, reason:err.message}; }
}

/* ---------- 설정 모달 ---------- */
document.getElementById("setbtn").onclick = ()=>{
  document.getElementById("pat").value = localStorage.getItem("gh_pat")||"";
  document.getElementById("setmodal").classList.remove("hidden");
};
document.getElementById("setclose").onclick = ()=>document.getElementById("setmodal").classList.add("hidden");
document.getElementById("setsave").onclick = ()=>{
  const v = document.getElementById("pat").value.trim();
  if(v) localStorage.setItem("gh_pat",v); else localStorage.removeItem("gh_pat");
  document.getElementById("setmodal").classList.add("hidden");
};

/* ---------- 모바일 네비 ---------- */
function setupResponsiveNav(){
  const mb = document.getElementById("menubtn");
  if(window.innerWidth<=780){ mb.style.display="inline-block"; }
  mb.onclick = ()=>document.getElementById("nav").classList.toggle("open");
}
function closeNavMobile(){ if(window.innerWidth<=780) document.getElementById("nav").classList.remove("open"); }

/* ---------- 유틸 ---------- */
function shortSubject(s){
  s = (s||"").replace(/^\d과목\s*/,"").trim();
  const map={
    "소프트웨어 설계":"SW설계","소프트웨어 개발":"SW개발",
    "데이터베이스 구축":"DB구축","프로그래밍 언어 활용":"언어활용",
    "정보시스템 구축관리":"시스템관리"
  };
  return map[s]||s;
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
